<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website</title>
    <style>
        /* Mobile-friendly improvements */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            padding: 10px;
        }
        .navbar h1 {
            color: white;
            font-size: 24px;
            margin: 0;
        }
        .menu-icon {
            display: none;
            cursor: pointer;
        }
        .menu {
            display: flex;
            gap: 15px;
        }
        .menu a {
            color: white;
            text-decoration: none;
        }

        /* Hamburger Menu Styles */
        @media (max-width: 768px) {
            .menu {
                display: none;
                flex-direction: column;
                position: absolute;
                background-color: #333;
                width: 100%;
                top: 50px;
                left: 0;
            }
            .menu-icon {
                display: block;
                font-size: 28px;
                color: white;
            }
            .navbar.active .menu {
                display: flex;
            }
        }

        /* Decorative elements hidden on mobile */
        .decorative-element {
            display: block;
        }
        @media (max-width: 768px) {
            .decorative-element {
                display: none;
            }
        }

        /* Improved touch targets */
        .menu a {
            padding: 10px 15px;
            border-radius: 5px;
        }

        /* Responsive spacing and typography scaling */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
            .navbar h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Your Logo</h1>
        <div class="menu-icon" onclick="document.querySelector('.navbar').classList.toggle('active')">&#9776;</div>
        <div class="menu">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
    <div class="decorative-element">
        <p>This is a decorative element.</p>
    </div>
</body>
</html>
