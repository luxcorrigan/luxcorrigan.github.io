<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Lux Corrigan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #0e0d0b;
      --parchment:#f5f0e8;
      --gold:     #b8974a;
      --gold-dim: #8a6f33;
      --text:     #d6cfc3;
      --muted:    #7a7060;
      --rule:     #2a2720;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--ink);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: .55;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.6rem 4rem;
      background: linear-gradient(to bottom, rgba(14,13,11,.95) 0%, rgba(14,13,11,0) 100%);
    }
    nav .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 2.5rem;
    }
    nav ul a {
      color: var(--muted);
      text-decoration: none;
      font-size: .72rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      transition: color .3s;
    }
    nav ul a:hover { color: var(--gold); }
    nav ul a.active { color: var(--gold); }

    /* Hero Section */
    #hero {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 10vw;
      position: relative;
      overflow: hidden;
      margin-top: 3rem;
    }

    #hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: var(--parchment);
      opacity: 0;
      animation: fadeUp 1s ease-out forwards;
    }

    #hero h1 em {
      font-style: italic;
      color: var(--gold);
    }

    #hero p {
      font-size: 1.1rem;
      color: var(--text);
      max-width: 600px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease-out forwards;
      animation-delay: 0.2s;
    }

    /* Portfolio Grid */
    .portfolio-section {
      padding: 6rem 10vw;
      position: relative;
      z-index: 1;
    }

    .section-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: .95rem;
      font-weight: 300;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--rule), transparent);
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 3rem;
      margin-bottom: 4rem;
    }

    .work-card {
      background: rgba(42, 39, 32, 0.5);
      border: 1px solid var(--rule);
      padding: 2.5rem;
      border-radius: 2px;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .work-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(184, 151, 74, 0.1), transparent);
      transition: left 0.6s ease;
    }

    .work-card:hover::before {
      left: 100%;
    }

    .work-card:hover {
      border-color: var(--gold-dim);
      background: rgba(42, 39, 32, 0.8);
    }

    .work-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--parchment);
      margin-bottom: 0.5rem;
    }

    .work-type {
      font-size: 0.75rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    .work-description {
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    /* Video Player */
    .video-player {
      margin-top: 2rem;
      border-radius: 2px;
      overflow: hidden;
      background: rgba(14, 13, 11, 0.8);
      border: 1px solid var(--rule);
    }

    .video-player iframe {
      border-radius: 2px;
    }

    /* Social Links Section */
    .social-section {
      padding: 4rem 10vw;
      border-top: 1px solid var(--rule);
      text-align: center;
    }

    .social-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 2rem;
      color: var(--parchment);
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .social-icon {
      font-size: 3rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
    }

    .social-link:hover .social-icon {
      transform: translateY(-4px);
      color: var(--parchment);
    }

    .social-label {
      font-size: 0.85rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.3s ease;
    }

    .social-link:hover .social-label {
      color: var(--gold);
    }

    /* Footer */
    footer {
      padding: 2rem 10vw;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav { 
        padding: 1.4rem 1.5rem; 
        gap: 1.5rem;
      }
      nav .logo { 
        font-size: .95rem; 
        letter-spacing: .12em; 
      }
      nav ul { 
        gap: 1.8rem; 
      }
      nav ul a { 
        font-size: .7rem; 
        letter-spacing: .15em;
      }

      #hero { 
        padding: 6rem 6vw 3rem; 
        min-height: 60vh;
      }

      #hero h1 { 
        font-size: clamp(2.4rem, 10vw, 4.5rem); 
        margin-bottom: 1.2rem;
      }

      #hero p {
        font-size: 1rem;
      }

      .portfolio-section {
        padding: 4rem 6vw;
      }

      .portfolio-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .work-card {
        padding: 2rem;
      }

      .social-links {
        gap: 1.5rem;
      }

      .social-icon {
        font-size: 2.5rem;
      }

      footer {
        flex-direction: column;
        gap: 1rem;
        padding: 2rem 6vw;
      }
    }

    @media (max-width: 480px) {
      nav {
        padding: 1rem;
      }

      nav .logo {
        font-size: 0.8rem;
      }

      #hero {
        padding: 5rem 4vw 2rem;
      }

      #hero h1 {
        font-size: clamp(1.8rem, 8vw, 3rem);
      }

      .portfolio-section {
        padding: 2.5rem 4vw;
      }

      .section-label {
        font-size: 0.85rem;
        margin-bottom: 2rem;
      }

      .work-card {
        padding: 1.5rem;
      }

      .work-title {
        font-size: 1.4rem;
      }

      .social-links {
        gap: 1rem;
        flex-wrap: wrap;
      }

      .social-icon {
        font-size: 2rem;
      }

      footer {
        padding: 1.5rem 4vw;
        font-size: 0.6rem;
      }
    }
  </style>
</head>
